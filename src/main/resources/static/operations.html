<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Machine Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .header a { color: #888; text-decoration: none; font-size: 0.9rem; }
        .header a:hover { color: #c8a96e; }
        h1 { font-size: 1.8rem; color: #c8a96e; }
        .layout {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            max-width: 900px;
        }
        .panel {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 1.5rem;
            flex: 1;
            min-width: 300px;
        }
        h2 {
            font-size: 1.1rem;
            color: #c8a96e;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #0f3460;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }
        label:first-of-type { margin-top: 0; }
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 0.55rem 0.75rem;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95rem;
        }
        select:focus, input:focus { outline: none; border-color: #c8a96e; }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0;
            cursor: pointer;
            font-size: 0.95rem;
            color: #e0e0e0;
        }
        input[type="radio"] { accent-color: #c8a96e; }
        button {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.7rem;
            background: #c8a96e;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #e0c080; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-secondary {
            background: #0f3460;
            color: #c8a96e;
            border: 1px solid #c8a96e;
        }
        .btn-secondary:hover { background: #1a4a7a; }
        .toast {
            display: none;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .toast.success { background: #1a4a1a; border: 1px solid #4caf50; color: #a5d6a7; display: block; }
        .toast.error   { background: #4a1a1a; border: 1px solid #f44336; color: #ef9a9a; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← Home</a>
        <h1>☕ Coffee Machine Terminal</h1>
    </div>

    <div class="layout">
        <!-- Dispense Panel -->
        <div class="panel">
            <h2>Dispense Coffee</h2>

            <label for="machine-select">Machine</label>
            <select id="machine-select">
                <option value="">Loading machines...</option>
            </select>

            <label for="username">User</label>
            <input type="text" id="username" placeholder="e.g. mueller" value="mueller">

            <label>Coffee Type</label>
            <div class="radio-group">
                <label><input type="radio" name="coffeeType" value="ESPRESSO"> Espresso (10 beans)</label>
                <label><input type="radio" name="coffeeType" value="DOUBLE_ESPRESSO" checked> Double Espresso (20 beans)</label>
                <label><input type="radio" name="coffeeType" value="AMERICANO"> Americano (5 beans)</label>
                <label><input type="radio" name="coffeeType" value="HOT_WATER"> Hot Water (0 beans)</label>
            </div>

            <button id="dispense-btn" onclick="dispense()">☕ Dispense Coffee</button>
            <div id="dispense-toast" class="toast"></div>
        </div>

        <!-- Refill Panel -->
        <div class="panel">
            <h2>Refill Beans</h2>

            <label for="refill-machine">Machine</label>
            <select id="refill-machine">
                <option value="">Loading machines...</option>
            </select>

            <label for="refill-user">Technician</label>
            <input type="text" id="refill-user" placeholder="e.g. technik" value="technik">

            <label for="beans-amount">Beans to Add</label>
            <input type="number" id="beans-amount" value="20" min="1" max="200">

            <button class="btn-secondary" onclick="refill()">🫘 Refill Beans</button>
            <div id="refill-toast" class="toast"></div>
        </div>
    </div>

    <script>
        async function loadMachines() {
            const res = await fetch('/api/machines');
            const machines = await res.json();

            ['machine-select', 'refill-machine'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '';
                machines.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `${m.name} (${m.beansAvailable} beans)`;
                    sel.appendChild(opt);
                });
            });
        }

        function showToast(id, message, type) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.className = `toast ${type}`;
            setTimeout(() => { el.className = 'toast'; }, 4000);
        }

        async function dispense() {
            const machineId = document.getElementById('machine-select').value;
            const user = document.getElementById('username').value.trim();
            const coffeeType = document.querySelector('input[name="coffeeType"]:checked').value;

            if (!machineId || !user) {
                showToast('dispense-toast', 'Please select a machine and enter a username.', 'error');
                return;
            }

            const btn = document.getElementById('dispense-btn');
            btn.disabled = true;

            try {
                const res = await fetch(`/api/machines/${machineId}/produce-coffee`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coffeeType, user })
                });

                if (res.ok) {
                    showToast('dispense-toast', `✓ ${coffeeType.replace('_', ' ')} dispensed for ${user}`, 'success');
                    loadMachines();
                } else {
                    const data = await res.json();
                    showToast('dispense-toast', `✗ ${data.error}`, 'error');
                }
            } catch (e) {
                showToast('dispense-toast', '✗ Network error', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        async function refill() {
            const machineId = document.getElementById('refill-machine').value;
            const user = document.getElementById('refill-user').value.trim();
            const beansToAdd = parseInt(document.getElementById('beans-amount').value);

            if (!machineId || !user || isNaN(beansToAdd) || beansToAdd < 1) {
                showToast('refill-toast', 'Please fill in all fields correctly.', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/machines/${machineId}/refill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ beansToAdd, user })
                });

                if (res.ok) {
                    showToast('refill-toast', `✓ Added ${beansToAdd} beans by ${user}`, 'success');
                    loadMachines();
                } else {
                    showToast('refill-toast', '✗ Refill failed', 'error');
                }
            } catch (e) {
                showToast('refill-toast', '✗ Network error', 'error');
            }
        }

        loadMachines();
    </script>
</body>
</html>
