spring.application.name=smartcoffee

# Docker Compose auto-start requires Docker Compose >= v2.26.
# Start postgres manually: docker compose up -d
spring.docker.compose.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/smartcoffee
spring.datasource.username=smartcoffee
spring.datasource.password=smartcoffee

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

snapshot.threshold=5
